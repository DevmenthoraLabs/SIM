<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="src/assets/image_login.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIM</title>
  <script>
    (function () {
      const stored = localStorage.getItem('sim_theme') || 'system'

      const systemDark = window.matchMedia(
        '(prefers-color-scheme: dark)'
      ).matches

      const isDark =
        stored === 'dark' ||
        (stored === 'system' && systemDark)

      document.documentElement.classList.toggle('dark', isDark)
    })()
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
